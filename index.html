<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Petugas - Bank SUMUT Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        .font-digital { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-white p-4 shadow flex justify-between items-center border-b-2 border-orange-500">
        <div class="flex items-center gap-3">
            <img src="Logo_Bank_Sumut.png" alt="Logo" class="h-10 w-auto object-contain">
            <h1 class="text-blue-900 font-black tracking-wide hidden sm:block">PANEL ONLINE PETUGAS</h1>
        </div>
        <span class="text-xs bg-emerald-600 text-white px-3 py-1 rounded-full font-bold uppercase">CLOUD CONNECTED</span>
    </header>

    <section class="max-w-6xl mx-auto w-full px-6 pt-6">
        <div class="bg-slate-800 text-white p-4 rounded-2xl shadow-md grid grid-cols-2 gap-4 border-b-4 border-blue-900">
            <div class="text-center border-r border-slate-700 py-1">
                <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Live Monitor CS</p>
                <p id="live-cs" class="text-3xl font-digital text-white mt-1">CS-000</p>
            </div>
            <div class="text-center py-1">
                <p class="text-xs font-bold text-orange-400 uppercase tracking-widest">Live Monitor Teller</p>
                <p id="live-teller" class="text-3xl font-digital text-white mt-1">TL-000</p>
            </div>
        </div>
    </section>

    <main class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto w-full flex-grow">
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-emerald-500">
                <h3 class="text-emerald-700 font-black mb-4">CUSTOMER SERVICE (CS)</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onclick="panggil('cs')" class="bg-emerald-600 text-white font-bold py-5 rounded-2xl shadow hover:bg-emerald-700 transition active:scale-95 cursor-pointer">PANGGIL BERIKUTNYA</button>
                    <button onclick="ulang('cs')" class="bg-orange-500 text-white font-bold py-5 rounded-2xl shadow hover:bg-orange-600 transition active:scale-95 cursor-pointer">PANGGIL ULANG</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-900">
                <h3 class="text-blue-900 font-black mb-4">TELLER LAYANAN</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onclick="panggil('teller')" class="bg-blue-900 text-white font-bold py-5 rounded-2xl shadow hover:bg-blue-950 transition active:scale-95 cursor-pointer">PANGGIL BERIKUTNYA</button>
                    <button onclick="ulang('teller')" class="bg-orange-500 text-white font-bold py-5 rounded-2xl shadow hover:bg-orange-600 transition active:scale-95 cursor-pointer">PANGGIL ULANG</button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-lg">
                <h3 class="font-black text-gray-700 mb-4">⚙️ CONTROL CENTER</h3>
                
                <label class="block text-sm font-bold text-gray-500 mb-1">Tambah ID Video YouTube Baru</label>
                <div class="flex gap-2 mb-3">
                    <input id="input-url-youtube" type="text" class="flex-grow p-3 bg-gray-50 border rounded-xl text-sm font-semibold text-gray-700" placeholder="Contoh: dQw4w9WgXcQ">
                    <button onclick="tambahVideo()" class="bg-blue-900 text-white font-bold px-4 rounded-xl hover:bg-blue-950 cursor-pointer text-xs">TAMBAH</button>
                </div>
                <label class="block text-[11px] font-bold text-gray-400 mb-1">Daftar Video Aktif di TV:</label>
                <div id="list-playlist-video" class="space-y-2 max-h-[110px] overflow-y-auto border p-2 rounded-xl bg-gray-50 mb-6 text-xs text-gray-600">
                    <p class="text-gray-400 italic">Memuat video cloud...</p>
                </div>

                <hr class="my-4 border-gray-200">

                <label class="block text-sm font-bold text-gray-500 mb-1">Tambah Teks Informasi Baru</label>
                <div class="flex gap-2 mb-3">
                    <input id="input-pengumuman" type="text" class="flex-grow p-3 bg-gray-50 border rounded-xl text-sm font-semibold text-gray-700" placeholder="Ketik kalimat informasi di sini...">
                    <button onclick="tambahPengumuman()" class="bg-emerald-600 text-white font-bold px-4 rounded-xl hover:bg-emerald-700 cursor-pointer text-xs">TAMBAH</button>
                </div>
                <label class="block text-[11px] font-bold text-gray-400 mb-1">Daftar Informasi Berjalan Saat Ini:</label>
                <div id="list-playlist-teks" class="space-y-2 max-h-[110px] overflow-y-auto border p-2 rounded-xl bg-gray-50 mb-4 text-xs text-gray-600">
                    <p class="text-gray-400 italic">Memuat teks cloud...</p>
                </div>
            </div>
            
            <button onclick="konfirmasiResetHarian()" class="w-full bg-orange-50 text-orange-700 font-bold py-4 rounded-2xl border-2 border-orange-300 hover:bg-orange-600 hover:text-white transition cursor-pointer text-sm shadow-sm">RESET NOMOR ANTRIAN KE 0 (Video & Teks Tetap Aman)</button>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCY3RjNKQULXZmU18gxx3uKS0PE3D4kpgk",
            authDomain: "antreankcpbrandan.firebaseapp.com",
            databaseURL: "https://antreankcpbrandan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antreankcpbrandan",
            storageBucket: "antreankcpbrandan.firebasestorage.app",
            messagingSenderId: "58543339432",
            appId: "1:58543339432:web:32977417fabdd83b5a8f9d",
            measurementId: "G-Y8WZMRR4N0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentData = { cs: 0, teller: 0, videos: {}, pengumumanMulti: {} };

        database.ref('antrean').on('value', (snapshot) => {
            if(snapshot.exists()) currentData = snapshot.val();
            
            document.getElementById('live-cs').innerText = 'CS-' + String(currentData.cs || 0).padStart(3, '0');
            document.getElementById('live-teller').innerText = 'TL-' + String(currentData.teller || 0).padStart(3, '0');
            
            const boxPlaylist = document.getElementById('list-playlist-video');
            boxPlaylist.innerHTML = "";
            if (currentData.videos) {
                Object.entries(currentData.videos).forEach(([key, idVideo]) => {
                    boxPlaylist.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 border rounded-lg shadow-sm">
                            <span class="font-mono font-bold text-gray-700">${idVideo}</span>
                            <button onclick="hapusVideo('${key}')" class="text-red-500 font-bold hover:text-red-700 px-1 cursor-pointer">✕ Hapus</button>
                        </div>`;
                });
            } else {
                boxPlaylist.innerHTML = `<p class="text-gray-400 italic p-1">Tidak ada video khusus. TV memutar video bawaan.</p>`;
            }

            const boxTeks = document.getElementById('list-playlist-teks');
            boxTeks.innerHTML = "";
            if (currentData.pengumumanMulti) {
                Object.entries(currentData.pengumumanMulti).forEach(([key, teksInfo]) => {
                    boxTeks.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 border rounded-lg shadow-sm">
                            <span class="truncate pr-4 text-gray-700 font-medium">${teksInfo}</span>
                            <button onclick="hapusPengumuman('${key}')" class="text-red-500 font-bold hover:text-red-700 px-1 shrink-0 cursor-pointer">✕ Hapus</button>
                        </div>`;
                });
            } else {
                boxTeks.innerHTML = `<p class="text-gray-400 italic p-1">Tidak ada informasi khusus. TV memutar teks bawaan.</p>`;
            }
        });

        function tambahVideo() {
            const input = document.getElementById('input-url-youtube');
            const idVideo = input.value.trim();
            if (idVideo.length === 11) {
                database.ref('antrean/videos').push(idVideo).then(() => { input.value = ""; });
            } else { alert("ID Video harus 11 karakter!"); }
        }

        function hapusVideo(key) {
            if(confirm("Hapus video ini?")) { database.ref(`antrean/videos/${key}`).remove(); }
        }

        function tambahPengumuman() {
            const input = document.getElementById('input-pengumuman');
            const teksInfo = input.value.trim();
            if (teksInfo) {
                database.ref('antrean/pengumumanMulti').push(teksInfo).then(() => { input.value = ""; });
            } else { alert("Teks pengumuman tidak boleh kosong!"); }
        }

        function hapusPengumuman(key) {
            if(confirm("Hapus teks informasi ini dari TV?")) { database.ref(`antrean/pengumumanMulti/${key}`).remove(); }
        }

        function panggil(tipe) {
            if (tipe === 'cs') currentData.cs = (currentData.cs || 0) + 1;
            else currentData.teller = (currentData.teller || 0) + 1;

            database.ref('antrean/cs').set(currentData.cs);
            database.ref('antrean/teller').set(currentData.teller);
            
            let nomor = tipe === 'cs' ? currentData.cs : currentData.teller;
            database.ref('panggilanTerakhir').set({
                nomorEjaan: (tipe === 'cs' ? 'C S ' : 'Teller ') + nomor,
                tujuan: tipe === 'cs' ? 'Customer Service' : 'Teller',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function ulang(tipe) {
            let nomor = tipe === 'cs' ? currentData.cs : currentData.teller;
            if(nomor > 0) {
                database.ref('panggilanTerakhir').set({
                    nomorEjaan: (tipe === 'cs' ? 'C S ' : 'Teller ') + nomor,
                    tujuan: tipe === 'cs' ? 'Customer Service' : 'Teller',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }

        function konfirmasiResetHarian() {
            if(confirm("Kembalikan nomor antrean ke 0 untuk pagi ini? (Daftar video & teks pengumuman Anda tetap aman disimpan)")) {
                database.ref('antrean/cs').set(0);
                database.ref('antrean/teller').set(0);
                alert('Nomor antrean berhasil di-reset ke 0!');
            }
        }
    </script>
</body>
</html>
